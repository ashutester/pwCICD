name: Playwright Tests & Dashboard

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 10 * * *'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      
      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
      
      - name: Check if test-results.json exists
        if: always()
        run: |
          if [ -f test-results.json ]; then
            echo "✅ test-results.json found!"
            ls -lh test-results.json
          else
            echo "❌ test-results.json NOT found"
            ls -la
          fi
      
      - name: Generate test metrics
        if: always()
        run: node scripts/generate-metrics.js
      
      - name: Commit dashboard data
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/dashboard-data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update test dashboard - $(date)" && git push)
      
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30